spring:
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://localhost:3306/postgraduate?useSSL=false&useUnicode=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&allowPublicKeyRetrieval=true&allowMultiQueries=true
          username: root
          password: ${SPRING_DATASOURCE_PASSWORD:}
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.zaxxer.hikari.HikariDataSource
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 10s
    lettuce:
      pool:
        max-active: 4
        max-idle: 4
        min-idle: 1
        max-wait: 5000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  security:
    user:
      name: admin
      password: password
  main:
    lazy-initialization: true   # 延迟Bean初始化，显著降低启动峰值内存

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.josp.system.entity

jwt:
  tokenHeader: Authorization
  secret: josp-system-template-secret-key-2026-very-long-and-secure
  expiration: 604800 # 7 days
  tokenHead: "Bearer "

server:
  port: 8081

logging:
  level:
    com.josp.system: info
